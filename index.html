<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Budget Planner</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#0f1115" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Budget" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<link rel="icon" href="./icons/icon-512.png" />

<style>
  :root {
    --bg: #0f1115;
    --bg-elev: #171a21;
    --bg-elev-2: #1e2229;
    --border: #2a2f3a;
    --text: #e8eaed;
    --text-dim: #9aa3b2;
    --accent: #34d399;
    --accent-dim: #1f6f56;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding-bottom: 60px;
  }
  #root { max-width: 1100px; margin: 0 auto; padding: 16px; }

  header.top {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    padding: 12px 4px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  header.top h1 { font-size: 20px; margin: 0; font-weight: 600; }
  .month-switcher { display: flex; align-items: center; gap: 8px; }
  .month-switcher button.nav {
    background: var(--bg-elev-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 16px;
  }
  .month-label { min-width: 140px; text-align: center; font-weight: 500; }
  select, input, textarea {
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 14px;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { outline: 1px solid var(--accent); }
  button { font-family: inherit; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }
  .summary-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .summary-card .label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .summary-card .value { font-size: 19px; font-weight: 600; }
  .pos { color: var(--accent); }
  .neg { color: var(--red); }

  section.block { margin-bottom: 32px; }
  section.block > h2 {
    font-size: 16px;
    margin: 0 0 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .categories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
  }
  .category-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .category-card h3 {
    margin: 0 0 4px;
    font-size: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .category-card .cat-totals { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
  .subcat-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .subcat-row input.name { flex: 1; min-width: 0; }
  .subcat-row input.planned { width: 80px; text-align: right; }
  .subcat-row .spent-tag {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 60px;
    text-align: right;
  }
  .icon-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 6px;
  }
  .icon-btn:hover { color: var(--red); background: var(--bg-elev-2); }
  .add-link {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--accent);
    cursor: pointer;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    width: 100%;
    margin-top: 4px;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); }
  th { color: var(--text-dim); font-weight: 500; font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  .tx-amount { text-align: right; font-weight: 500; }
  .tx-form {
    display: grid;
    grid-template-columns: 130px 150px 110px 1fr auto;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }
  .chart-wrap {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 24px;
  }
  .chart-legend { display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
  .chart-legend .row { display: flex; align-items: center; gap: 8px; }
  .chart-legend .swatch { width: 12px; height: 12px; border-radius: 3px; flex: none; }
  .chart-legend .lg-name { min-width: 96px; }
  .chart-legend .lg-val { color: var(--text-dim); }
  @media (max-width: 760px) {
    .tx-form { grid-template-columns: 1fr 1fr; }
  }
  .btn-primary {
    background: var(--accent);
    color: #06241a;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
  }
  .btn-primary:hover { opacity: 0.9; }
  .table-wrap { overflow-x: auto; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 12px; }
  .empty-note { color: var(--text-dim); font-size: 13px; padding: 16px 0; text-align: center; }

  .funds-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
  }
  .fund-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .fund-card h3 { margin: 0 0 8px; font-size: 15px; display: flex; justify-content: space-between; }
  .fund-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 10px; }
  .progress-track {
    background: var(--bg-elev-2);
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
    margin: 8px 0;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.3s ease;
  }
  .fund-form {
    display: grid;
    grid-template-columns: 1fr 100px 100px auto;
    gap: 8px;
    margin-bottom: 14px;
  }
  @media (max-width: 760px) {
    .fund-form { grid-template-columns: 1fr 1fr; }
  }
  .fund-actions { display: flex; gap: 6px; margin-top: 8px; }
  .fund-actions button {
    flex: 1;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .fund-actions button:hover { border-color: var(--accent); }

  footer.app-footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding-top: 20px;
  }
  .install-banner {
    background: var(--bg-elev-2);
    border: 1px solid var(--accent-dim);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .install-banner button {
    background: var(--accent);
    border: none;
    color: #06241a;
    border-radius: 8px;
    padding: 6px 12px;
    font-weight: 600;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
/* ============================================================
   Budget Planner — single file, zero dependencies, no build.
   Works by double-clicking index.html (file://) and offline.
   ============================================================ */
(function () {
  "use strict";

  var STORAGE_KEY = "budgetPlannerData_v1";
  var FIXED_CATEGORIES = ["Income", "Expenses", "Bills", "Subscriptions", "Debts", "Savings"];
  var OUTFLOW_CATEGORIES = ["Expenses", "Bills", "Subscriptions", "Debts", "Savings"];
  var CURRENCIES = [
    { code: "EUR", symbol: "€" },
    { code: "USD", symbol: "$" },
    { code: "GBP", symbol: "£" },
    { code: "CHF", symbol: "CHF" },
    { code: "JPY", symbol: "¥" },
    { code: "CAD", symbol: "CA$" },
    { code: "AUD", symbol: "AU$" }
  ];

  var CATEGORY_COLORS = {
    Expenses: "#60a5fa",
    Bills: "#fbbf24",
    Subscriptions: "#a78bfa",
    Debts: "#f87171",
    Savings: "#34d399"
  };

  /* ---------- helpers ---------- */
  function svgEl(tag, attrs) {
    var e = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for (var k in attrs) { if (attrs[k] != null) e.setAttribute(k, attrs[k]); }
    return e;
  }
  function slicePath(cx, cy, r, a0, a1) {
    var x0 = cx + r * Math.sin(a0), y0 = cy - r * Math.cos(a0);
    var x1 = cx + r * Math.sin(a1), y1 = cy - r * Math.cos(a1);
    var large = (a1 - a0) > Math.PI ? 1 : 0;
    return "M" + cx + "," + cy + " L" + x0 + "," + y0 +
      " A" + r + "," + r + " 0 " + large + " 1 " + x1 + "," + y1 + " Z";
  }
  function categorySpent(md) {
    var m = {};
    md.transactions.forEach(function (tx) {
      m[tx.category] = (m[tx.category] || 0) + num(tx.amount);
    });
    return m;
  }
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }
  function monthKey(date) {
    return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
  }
  function monthLabel(key) {
    var p = key.split("-").map(Number);
    return new Date(p[0], p[1] - 1, 1).toLocaleDateString(undefined, { month: "long", year: "numeric" });
  }
  function shiftMonth(key, delta) {
    var p = key.split("-").map(Number);
    return monthKey(new Date(p[0], p[1] - 1 + delta, 1));
  }
  function addMonths(date, months) {
    var d = new Date(date);
    d.setMonth(d.getMonth() + months);
    return d;
  }
  function num(v) {
    var n = Number(v);
    return isNaN(n) ? 0 : n;
  }
  function formatMoney(amount, currencyCode) {
    var cur = CURRENCIES.filter(function (c) { return c.code === currencyCode; })[0] || CURRENCIES[0];
    var n = num(amount);
    var sign = n < 0 ? "-" : "";
    var abs = Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return sign + cur.symbol + abs;
  }

  /* el(tag, attrs, ...children) tiny DOM builder */
  function el(tag, attrs) {
    var e = document.createElement(tag);
    attrs = attrs || {};
    for (var k in attrs) {
      if (!attrs.hasOwnProperty(k)) continue;
      var v = attrs[k];
      if (v == null) continue;
      if (k === "class") e.className = v;
      else if (k === "value") e.value = v;
      else if (k === "checked") e.checked = !!v;
      else if (k === "style" && typeof v === "object") { for (var s in v) e.style[s] = v[s]; }
      else if (k === "dataset") { for (var d in v) e.dataset[d] = v[d]; }
      else if (k.slice(0, 2) === "on" && typeof v === "function") e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    }
    for (var i = 2; i < arguments.length; i++) {
      var kid = arguments[i];
      append(e, kid);
    }
    return e;
  }
  function append(parent, kid) {
    if (kid == null || kid === false) return;
    if (Array.isArray(kid)) { kid.forEach(function (c) { append(parent, c); }); return; }
    parent.appendChild(typeof kid === "object" ? kid : document.createTextNode(String(kid)));
  }

  /* ---------- data ---------- */
  function defaultCategories() {
    return {
      Income: [{ id: uid(), name: "Salary", planned: 0 }],
      Expenses: [
        { id: uid(), name: "Groceries", planned: 0 },
        { id: uid(), name: "Transport", planned: 0 }
      ],
      Bills: [
        { id: uid(), name: "Rent", planned: 0 },
        { id: uid(), name: "Utilities", planned: 0 }
      ],
      Subscriptions: [{ id: uid(), name: "Streaming", planned: 0 }],
      Debts: [{ id: uid(), name: "Credit Card", planned: 0 }],
      Savings: [{ id: uid(), name: "Emergency Fund", planned: 0 }]
    };
  }
  function cloneCategoriesForNewMonth(categories) {
    var next = {};
    FIXED_CATEGORIES.forEach(function (cat) {
      next[cat] = (categories[cat] || []).map(function (s) {
        return { id: uid(), name: s.name, planned: s.planned };
      });
    });
    return next;
  }
  function loadData() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { /* ignore */ }
    var today = monthKey(new Date());
    var d = { currency: "EUR", currentMonth: today, months: {}, sinkingFunds: [] };
    d.months[today] = { categories: defaultCategories(), transactions: [] };
    return d;
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* ignore */ }
  }

  var state = loadData();

  function ensureMonth(key) {
    if (!state.months[key]) {
      var keys = Object.keys(state.months).sort();
      var last = keys[keys.length - 1];
      var base = last ? state.months[last].categories : defaultCategories();
      state.months[key] = { categories: cloneCategoriesForNewMonth(base), transactions: [] };
      save();
    }
    return state.months[key];
  }
  function currentMonthData() { return ensureMonth(state.currentMonth); }

  function spentMap(transactions) {
    var m = {};
    transactions.forEach(function (tx) {
      var key = tx.category + "::" + tx.subCategory;
      m[key] = (m[key] || 0) + num(tx.amount);
    });
    return m;
  }
  function computeTotals(md) {
    var plannedIncome = 0, plannedOutflow = 0, spent = 0, actualIncome = 0;
    (md.categories.Income || []).forEach(function (s) { plannedIncome += num(s.planned); });
    OUTFLOW_CATEGORIES.forEach(function (cat) {
      (md.categories[cat] || []).forEach(function (s) { plannedOutflow += num(s.planned); });
    });
    md.transactions.forEach(function (tx) {
      if (tx.category === "Income") actualIncome += num(tx.amount);
      else spent += num(tx.amount);
    });
    return {
      plannedIncome: plannedIncome,
      plannedOutflow: plannedOutflow,
      leftToBudget: plannedIncome - plannedOutflow,
      spent: spent,
      leftToSpend: plannedOutflow - spent,
      projectedBalance: plannedIncome - spent,
      actualIncome: actualIncome
    };
  }

  /* ---------- live (non-destructive) recompute ---------- */
  function updateComputed() {
    var md = currentMonthData();
    var cs = categorySpent(md);
    var t = computeTotals(md);
    var cur = state.currency;

    var sumDefs = {
      plannedIncome: { v: t.plannedIncome, cls: "" },
      spent: { v: t.spent, cls: "" },
      leftToSpend: { v: t.leftToSpend, cls: t.leftToSpend < 0 ? "neg" : "pos" }
    };
    Object.keys(sumDefs).forEach(function (id) {
      var node = document.querySelector('[data-sum="' + id + '"]');
      if (node) { node.textContent = formatMoney(sumDefs[id].v, cur); node.className = "value " + sumDefs[id].cls; }
    });

    // category totals (actual only, computed per category)
    var catNodes = document.querySelectorAll("[data-cat-totals]");
    Array.prototype.forEach.call(catNodes, function (node) {
      var cat = node.getAttribute("data-cat-totals");
      node.textContent = (cat === "Income" ? "Received " : "Spent ") + formatMoney(cs[cat] || 0, cur);
    });

    // funds
    var fundNodes = document.querySelectorAll("[data-fund-id]");
    Array.prototype.forEach.call(fundNodes, function (card) {
      var id = card.getAttribute("data-fund-id");
      var f = state.sinkingFunds.filter(function (x) { return x.id === id; })[0];
      if (!f) return;
      var pct = f.target > 0 ? Math.min(100, (f.saved / f.target) * 100) : 0;
      var remaining = Math.max(0, f.target - f.saved);
      var monthsLeft = f.monthlyContribution > 0 ? Math.ceil(remaining / f.monthlyContribution) : null;
      var completion = monthsLeft !== null
        ? addMonths(new Date(), monthsLeft).toLocaleDateString(undefined, { month: "short", year: "numeric" })
        : "—";
      var fill = card.querySelector(".progress-fill"); if (fill) fill.style.width = pct + "%";
      var setTxt = function (sel, txt) { var n = card.querySelector(sel); if (n) n.textContent = txt; };
      setTxt(".f-target", "Target: " + formatMoney(f.target, cur));
      setTxt(".f-saved", "Saved: " + formatMoney(f.saved, cur));
      setTxt(".f-pct", pct.toFixed(0) + "% funded");
      setTxt(".f-monthsleft", monthsLeft !== null ? monthsLeft + " months left" : "Set a monthly contribution");
      setTxt(".f-completion", "Est. completion: " + completion);
    });
  }

  /* ---------- environment ---------- */
  function isStandalone() {
    return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
      window.navigator.standalone === true;
  }
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  var installEvent = null;
  var installDismissed = false;

  /* ---------- sections ---------- */
  function renderHeader() {
    return el("header", { class: "top" },
      el("h1", {}, "💶 Budget Planner"),
      el("div", { class: "month-switcher" },
        el("button", { class: "nav", onclick: function () { state.currentMonth = shiftMonth(state.currentMonth, -1); save(); fullRender(); } }, "‹"),
        el("div", { class: "month-label" }, monthLabel(state.currentMonth)),
        el("button", { class: "nav", onclick: function () { state.currentMonth = shiftMonth(state.currentMonth, 1); save(); fullRender(); } }, "›")
      ),
      el("select", { onchange: function (e) { state.currency = e.target.value; save(); fullRender(); } },
        CURRENCIES.map(function (c) {
          return el("option", { value: c.code, selected: c.code === state.currency ? "selected" : null }, c.code + " (" + c.symbol + ")");
        })
      )
    );
  }

  function renderInstallBanner() {
    if (isStandalone() || installDismissed) return null;
    var msg;
    if (isIOS) msg = el("span", {}, 'Install on your iPhone/iPad: tap Share → "Add to Home Screen".');
    else if (installEvent) msg = el("span", {}, "Install this app for quick access from your dock or home screen.");
    else msg = el("span", {}, 'Tip: use your browser\'s "Install app" / "Add to Dock" option for offline access.');

    var buttons = [];
    if (installEvent) {
      buttons.push(el("button", { onclick: function () {
        installEvent.prompt();
        installEvent.userChoice.finally && installEvent.userChoice.finally(function () { installEvent = null; fullRender(); });
        installEvent = null;
      } }, "Install"));
    }
    buttons.push(el("button", {
      style: { background: "transparent", color: "var(--text-dim)", border: "1px solid var(--border)" },
      onclick: function () { installDismissed = true; fullRender(); }
    }, "Dismiss"));

    return el("div", { class: "install-banner" }, msg, el("div", { style: { display: "flex", gap: "8px" } }, buttons));
  }

  function renderSummary() {
    var defs = [
      { id: "plannedIncome", label: "Planned Income" },
      { id: "spent", label: "Spent" },
      { id: "leftToSpend", label: "Left to Spend" }
    ];
    return el("div", { class: "summary-grid" },
      defs.map(function (d) {
        return el("div", { class: "summary-card" },
          el("div", { class: "label" }, d.label),
          el("div", { class: "value", dataset: { sum: d.id } }, "—")
        );
      })
    );
  }

  function renderCategories() {
    var md = currentMonthData();
    return el("section", { class: "block" },
      el("h2", {}, "Envelopes"),
      el("div", { class: "categories-grid" },
        FIXED_CATEGORIES.map(function (cat) {
          var subs = md.categories[cat] || [];
          return el("div", { class: "category-card" },
            el("h3", {}, cat),
            el("div", { class: "cat-totals", dataset: { catTotals: cat } }, "—"),
            subs.map(function (sub) {
              return el("div", { class: "subcat-row" },
                el("input", {
                  class: "name", value: sub.name,
                  oninput: function (e) { sub.name = e.target.value; save(); updateComputed(); }
                }),
                el("input", {
                  class: "planned", type: "number", step: "0.01", value: sub.planned,
                  oninput: function (e) { sub.planned = e.target.value === "" ? 0 : num(e.target.value); save(); updateComputed(); }
                }),
                el("button", { class: "icon-btn", title: "Remove", onclick: function () {
                  md.categories[cat] = subs.filter(function (s) { return s.id !== sub.id; });
                  save(); fullRender();
                } }, "✕")
              );
            }),
            el("button", { class: "add-link", onclick: function () {
              md.categories[cat].push({ id: uid(), name: "New item", planned: 0 });
              save(); fullRender();
            } }, "+ Add sub-category")
          );
        })
      )
    );
  }

  function renderTransactions() {
    var md = currentMonthData();
    var todayStr = new Date().toISOString().slice(0, 10);

    var dateInput = el("input", { type: "date", value: todayStr, required: "required" });
    var catSelect = el("select", {});
    FIXED_CATEGORIES.forEach(function (c) { catSelect.appendChild(el("option", { value: c }, c)); });

    var amountInput = el("input", { type: "number", step: "0.01", placeholder: "Amount", required: "required" });
    var descInput = el("input", { type: "text", placeholder: "Description" });

    var form = el("form", { class: "tx-form", onsubmit: function (e) {
      e.preventDefault();
      if (amountInput.value === "") return;
      md.transactions.push({
        id: uid(), date: dateInput.value, category: catSelect.value,
        amount: num(amountInput.value), description: descInput.value
      });
      save(); fullRender();
    } },
      dateInput, catSelect, amountInput, descInput,
      el("button", { class: "btn-primary", type: "submit" }, "Add")
    );

    var sorted = md.transactions.slice().sort(function (a, b) { return a.date < b.date ? 1 : -1; });
    var tableArea;
    if (sorted.length === 0) {
      tableArea = el("div", { class: "empty-note" }, "No transactions this month yet.");
    } else {
      tableArea = el("table", {},
        el("thead", {}, el("tr", {},
          el("th", {}, "Date"), el("th", {}, "Category"),
          el("th", {}, "Description"), el("th", { style: { textAlign: "right" } }, "Amount"), el("th", {})
        )),
        el("tbody", {}, sorted.map(function (tx) {
          return el("tr", {},
            el("td", {}, tx.date), el("td", {}, tx.category),
            el("td", {}, tx.description), el("td", { class: "tx-amount" }, formatMoney(tx.amount, state.currency)),
            el("td", {}, el("button", { class: "icon-btn", title: "Delete", onclick: function () {
              md.transactions = md.transactions.filter(function (t) { return t.id !== tx.id; });
              save(); fullRender();
            } }, "✕"))
          );
        }))
      );
    }

    return el("section", { class: "block" },
      el("h2", {}, "Transactions"),
      form,
      el("div", { class: "table-wrap" }, tableArea)
    );
  }

  function renderFunds() {
    var nameInput = el("input", { type: "text", placeholder: "Goal name", required: "required" });
    var targetInput = el("input", { type: "number", step: "0.01", placeholder: "Target", required: "required" });
    var contribInput = el("input", { type: "number", step: "0.01", placeholder: "Monthly " + (CURRENCIES.filter(function (c) { return c.code === state.currency; })[0] || CURRENCIES[0]).symbol });

    var form = el("form", { class: "fund-form", onsubmit: function (e) {
      e.preventDefault();
      if (!nameInput.value || targetInput.value === "") return;
      state.sinkingFunds.push({
        id: uid(), name: nameInput.value, target: num(targetInput.value),
        monthlyContribution: num(contribInput.value), saved: 0
      });
      save(); fullRender();
    } },
      nameInput, targetInput, contribInput,
      el("button", { class: "btn-primary", type: "submit" }, "Add Goal")
    );

    var grid;
    if (state.sinkingFunds.length === 0) {
      grid = el("div", { class: "empty-note" }, "No sinking funds yet. Add a savings goal above.");
    } else {
      grid = el("div", { class: "funds-grid" },
        state.sinkingFunds.map(function (f) {
          return el("div", { class: "fund-card", dataset: { fundId: f.id } },
            el("h3", {},
              el("input", {
                value: f.name,
                style: { background: "transparent", border: "none", color: "inherit", fontSize: "15px", fontWeight: "600", padding: "0" },
                oninput: function (e) { f.name = e.target.value; save(); }
              }),
              el("button", { class: "icon-btn", title: "Delete", onclick: function () {
                state.sinkingFunds = state.sinkingFunds.filter(function (x) { return x.id !== f.id; });
                save(); fullRender();
              } }, "✕")
            ),
            el("div", { class: "fund-meta" },
              el("span", { class: "f-target" }, "—"),
              el("span", { class: "f-saved" }, "—")
            ),
            el("div", { class: "progress-track" }, el("div", { class: "progress-fill", style: { width: "0%" } })),
            el("div", { class: "fund-meta" },
              el("span", { class: "f-pct" }, "—"),
              el("span", { class: "f-monthsleft" }, "—"),
              el("span", { class: "f-completion" }, "—")
            ),
            el("div", { style: { display: "flex", gap: "8px", marginTop: "8px", alignItems: "center", flexWrap: "wrap" } },
              el("label", { style: { fontSize: "12px", color: "var(--text-dim)" } }, "Monthly"),
              el("input", {
                type: "number", step: "0.01", value: f.monthlyContribution, style: { width: "80px" },
                oninput: function (e) { f.monthlyContribution = num(e.target.value); save(); updateComputed(); }
              }),
              el("label", { style: { fontSize: "12px", color: "var(--text-dim)" } }, "Saved"),
              el("input", {
                type: "number", step: "0.01", value: f.saved, style: { width: "90px" },
                oninput: function (e) { f.saved = num(e.target.value); save(); updateComputed(); }
              })
            ),
            el("div", { class: "fund-actions" },
              el("button", { onclick: function () { f.saved = num(f.saved) + num(f.monthlyContribution); save(); fullRender(); } },
                "+ Log monthly contribution")
            )
          );
        })
      );
    }

    return el("section", { class: "block" },
      el("h2", {}, "Sinking Funds"),
      form,
      grid
    );
  }

  function renderChart() {
    var md = currentMonthData();
    var cs = categorySpent(md);
    var data = OUTFLOW_CATEGORIES
      .map(function (c) { return { cat: c, val: cs[c] || 0 }; })
      .filter(function (d) { return d.val > 0; });
    var total = data.reduce(function (s, d) { return s + d.val; }, 0);

    var section = el("section", { class: "block" }, el("h2", {}, "Spending by category"));
    if (total <= 0) {
      section.appendChild(el("div", { class: "empty-note" }, "No spending recorded this month yet."));
      return section;
    }

    var size = 180, r = 82, cx = 90, cy = 90;
    var svg = svgEl("svg", { width: size, height: size, viewBox: "0 0 " + size + " " + size });
    if (data.length === 1) {
      svg.appendChild(svgEl("circle", { cx: cx, cy: cy, r: r, fill: CATEGORY_COLORS[data[0].cat] || "#888" }));
    } else {
      var angle = 0;
      data.forEach(function (d) {
        var a0 = angle, a1 = angle + (d.val / total) * 2 * Math.PI;
        angle = a1;
        svg.appendChild(svgEl("path", {
          d: slicePath(cx, cy, r, a0, a1),
          fill: CATEGORY_COLORS[d.cat] || "#888",
          stroke: "#171a21", "stroke-width": 2
        }));
      });
    }
    // donut hole + total in center
    svg.appendChild(svgEl("circle", { cx: cx, cy: cy, r: 46, fill: "#171a21" }));

    var legend = el("div", { class: "chart-legend" },
      data.map(function (d) {
        var pct = Math.round((d.val / total) * 100);
        return el("div", { class: "row" },
          el("span", { class: "swatch", style: { background: CATEGORY_COLORS[d.cat] || "#888" } }),
          el("span", { class: "lg-name" }, d.cat),
          el("span", { class: "lg-val" }, formatMoney(d.val, state.currency) + " · " + pct + "%")
        );
      })
    );

    var chartArea = el("div", { class: "chart-wrap" });
    var svgBox = el("div", { style: { position: "relative", width: size + "px", height: size + "px", flex: "none" } });
    svgBox.appendChild(svg);
    svgBox.appendChild(el("div", {
      style: {
        position: "absolute", top: "0", left: "0", width: size + "px", height: size + "px",
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        pointerEvents: "none"
      }
    },
      el("div", { style: { fontSize: "11px", color: "var(--text-dim)" } }, "Total spent"),
      el("div", { style: { fontSize: "17px", fontWeight: "700" } }, formatMoney(total, state.currency))
    ));
    chartArea.appendChild(svgBox);
    chartArea.appendChild(legend);
    section.appendChild(chartArea);
    return section;
  }

  /* ---------- full render ---------- */
  function fullRender() {
    ensureMonth(state.currentMonth);
    var root = document.getElementById("root");
    root.innerHTML = "";
    append(root, renderHeader());
    append(root, renderInstallBanner());
    append(root, renderSummary());
    append(root, renderChart());
    append(root, renderCategories());
    append(root, renderTransactions());
    append(root, renderFunds());
    append(root, el("footer", { class: "app-footer" }, "All data is stored locally on this device. No account, no servers."));
    updateComputed();
  }

  /* ---------- PWA ---------- */
  if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
    navigator.serviceWorker.register("./sw.js").catch(function () {});
  }
  window.addEventListener("beforeinstallprompt", function (e) {
    e.preventDefault();
    installEvent = e;
    fullRender();
  });

  fullRender();
})();
</script>
</body>
</html>
