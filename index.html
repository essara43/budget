<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Budget Planner</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#0f1115" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Budget" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<link rel="icon" href="./icons/icon-512.png" />

<style>
  :root {
    --bg: #0f1115;
    --bg-elev: #171a21;
    --bg-elev-2: #1e2229;
    --border: #2a2f3a;
    --text: #e8eaed;
    --text-dim: #9aa3b2;
    --accent: #34d399;
    --accent-dim: #1f6f56;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding-bottom: 60px;
  }
  #root { max-width: 1100px; margin: 0 auto; padding: 16px; }

  header.top {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    padding: 12px 4px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  header.top h1 { font-size: 20px; margin: 0; font-weight: 600; }
  .month-switcher { display: flex; align-items: center; gap: 8px; }
  .month-switcher button.nav {
    background: var(--bg-elev-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 16px;
  }
  .month-label { min-width: 140px; text-align: center; font-weight: 500; }
  select, input, textarea {
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 14px;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { outline: 1px solid var(--accent); }
  button { font-family: inherit; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }
  .summary-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .summary-card .label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .summary-card .value { font-size: 19px; font-weight: 600; }
  .pos { color: var(--accent); }
  .neg { color: var(--red); }

  section.block { margin-bottom: 32px; }
  section.block > h2 {
    font-size: 16px;
    margin: 0 0 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .categories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
  }
  .category-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .category-card h3 {
    margin: 0 0 4px;
    font-size: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .category-card .cat-totals { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
  .subcat-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .subcat-row input.name { flex: 1; min-width: 0; }
  .subcat-row input.planned { width: 80px; text-align: right; }
  .subcat-row .spent-tag {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 60px;
    text-align: right;
  }
  .icon-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 6px;
  }
  .icon-btn:hover { color: var(--red); background: var(--bg-elev-2); }
  .add-link {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--accent);
    cursor: pointer;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    width: 100%;
    margin-top: 4px;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); }
  th { color: var(--text-dim); font-weight: 500; font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  .tx-amount { text-align: right; font-weight: 500; }
  .tx-form {
    display: grid;
    grid-template-columns: 110px 130px 1fr 90px 1fr auto;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }
  @media (max-width: 760px) {
    .tx-form { grid-template-columns: 1fr 1fr; }
  }
  .btn-primary {
    background: var(--accent);
    color: #06241a;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
  }
  .btn-primary:hover { opacity: 0.9; }
  .table-wrap { overflow-x: auto; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 12px; }
  .empty-note { color: var(--text-dim); font-size: 13px; padding: 16px 0; text-align: center; }

  .funds-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
  }
  .fund-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .fund-card h3 { margin: 0 0 8px; font-size: 15px; display: flex; justify-content: space-between; }
  .fund-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 10px; }
  .progress-track {
    background: var(--bg-elev-2);
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
    margin: 8px 0;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.3s ease;
  }
  .fund-form {
    display: grid;
    grid-template-columns: 1fr 100px 100px auto;
    gap: 8px;
    margin-bottom: 14px;
  }
  @media (max-width: 760px) {
    .fund-form { grid-template-columns: 1fr 1fr; }
  }
  .fund-actions { display: flex; gap: 6px; margin-top: 8px; }
  .fund-actions button {
    flex: 1;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .fund-actions button:hover { border-color: var(--accent); }

  footer.app-footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding-top: 20px;
  }
  .install-banner {
    background: var(--bg-elev-2);
    border: 1px solid var(--accent-dim);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .install-banner button {
    background: var(--accent);
    border: none;
    color: #06241a;
    border-radius: 8px;
    padding: 6px 12px;
    font-weight: 600;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

const STORAGE_KEY = "budgetPlannerData_v1";
const FIXED_CATEGORIES = ["Income", "Expenses", "Bills", "Subscriptions", "Debts", "Savings"];
const OUTFLOW_CATEGORIES = ["Expenses", "Bills", "Subscriptions", "Debts", "Savings"];

const CURRENCIES = [
  { code: "EUR", symbol: "€" },
  { code: "USD", symbol: "$" },
  { code: "GBP", symbol: "£" },
  { code: "CHF", symbol: "CHF" },
  { code: "JPY", symbol: "¥" },
  { code: "CAD", symbol: "CA$" },
  { code: "AUD", symbol: "AU$" },
];

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function monthKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
}

function monthLabel(key) {
  const [y, m] = key.split("-").map(Number);
  const d = new Date(y, m - 1, 1);
  return d.toLocaleDateString(undefined, { month: "long", year: "numeric" });
}

function shiftMonth(key, delta) {
  const [y, m] = key.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return monthKey(d);
}

function defaultCategories() {
  return {
    Income: [{ id: uid(), name: "Salary", planned: 0 }],
    Expenses: [
      { id: uid(), name: "Groceries", planned: 0 },
      { id: uid(), name: "Transport", planned: 0 },
    ],
    Bills: [
      { id: uid(), name: "Rent", planned: 0 },
      { id: uid(), name: "Utilities", planned: 0 },
    ],
    Subscriptions: [{ id: uid(), name: "Streaming", planned: 0 }],
    Debts: [{ id: uid(), name: "Credit Card", planned: 0 }],
    Savings: [{ id: uid(), name: "Emergency Fund", planned: 0 }],
  };
}

function cloneCategoriesForNewMonth(categories) {
  const next = {};
  for (const cat of FIXED_CATEGORIES) {
    next[cat] = (categories[cat] || []).map((s) => ({ ...s, id: uid() }));
  }
  return next;
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {
    console.warn("Failed to load data", e);
  }
  const today = monthKey(new Date());
  return {
    currency: "EUR",
    currentMonth: today,
    months: {
      [today]: { categories: defaultCategories(), transactions: [] },
    },
    sinkingFunds: [],
  };
}

function formatMoney(amount, currencyCode) {
  const cur = CURRENCIES.find((c) => c.code === currencyCode) || CURRENCIES[0];
  const n = Number(amount) || 0;
  const sign = n < 0 ? "-" : "";
  const abs = Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return `${sign}${cur.symbol}${abs}`;
}

function App() {
  const [data, setData] = useState(loadData);
  const [installEvent, setInstallEvent] = useState(null);
  const [showInstallBanner, setShowInstallBanner] = useState(true);

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }, [data]);

  useEffect(() => {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
    const handler = (e) => {
      e.preventDefault();
      setInstallEvent(e);
    };
    window.addEventListener("beforeinstallprompt", handler);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);

  const isStandalone =
    window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  const monthKeyCurrent = data.currentMonth;

  // Ensure current month exists
  useEffect(() => {
    if (!data.months[monthKeyCurrent]) {
      setData((d) => {
        const monthsSorted = Object.keys(d.months).sort();
        const lastKey = monthsSorted[monthsSorted.length - 1];
        const baseCategories = lastKey ? d.months[lastKey].categories : defaultCategories();
        return {
          ...d,
          months: {
            ...d.months,
            [monthKeyCurrent]: {
              categories: cloneCategoriesForNewMonth(baseCategories),
              transactions: [],
            },
          },
        };
      });
    }
  }, [monthKeyCurrent]);

  const monthData = data.months[monthKeyCurrent] || { categories: defaultCategories(), transactions: [] };

  function setCurrentMonth(key) {
    setData((d) => ({ ...d, currentMonth: key }));
  }

  function setCurrency(code) {
    setData((d) => ({ ...d, currency: code }));
  }

  function updateCategories(updater) {
    setData((d) => ({
      ...d,
      months: {
        ...d.months,
        [monthKeyCurrent]: {
          ...d.months[monthKeyCurrent],
          categories: updater(d.months[monthKeyCurrent].categories),
        },
      },
    }));
  }

  function updateTransactions(updater) {
    setData((d) => ({
      ...d,
      months: {
        ...d.months,
        [monthKeyCurrent]: {
          ...d.months[monthKeyCurrent],
          transactions: updater(d.months[monthKeyCurrent].transactions),
        },
      },
    }));
  }

  function addSubcategory(cat) {
    updateCategories((categories) => ({
      ...categories,
      [cat]: [...categories[cat], { id: uid(), name: "New item", planned: 0 }],
    }));
  }

  function updateSubcategory(cat, id, patch) {
    updateCategories((categories) => ({
      ...categories,
      [cat]: categories[cat].map((s) => (s.id === id ? { ...s, ...patch } : s)),
    }));
  }

  function removeSubcategory(cat, id) {
    updateCategories((categories) => ({
      ...categories,
      [cat]: categories[cat].filter((s) => s.id !== id),
    }));
  }

  function addTransaction(tx) {
    updateTransactions((txs) => [...txs, { ...tx, id: uid() }]);
  }

  function removeTransaction(id) {
    updateTransactions((txs) => txs.filter((t) => t.id !== id));
  }

  function addFund(fund) {
    setData((d) => ({ ...d, sinkingFunds: [...d.sinkingFunds, { ...fund, id: uid() }] }));
  }

  function updateFund(id, patch) {
    setData((d) => ({
      ...d,
      sinkingFunds: d.sinkingFunds.map((f) => (f.id === id ? { ...f, ...patch } : f)),
    }));
  }

  function removeFund(id) {
    setData((d) => ({ ...d, sinkingFunds: d.sinkingFunds.filter((f) => f.id !== id) }));
  }

  // Spent per subcategory
  const spentBySubcat = useMemo(() => {
    const map = {};
    for (const tx of monthData.transactions) {
      const key = `${tx.category}::${tx.subCategory}`;
      map[key] = (map[key] || 0) + Number(tx.amount || 0);
    }
    return map;
  }, [monthData.transactions]);

  const totals = useMemo(() => {
    let plannedIncome = 0;
    let plannedOutflow = 0;
    for (const sub of monthData.categories.Income || []) plannedIncome += Number(sub.planned) || 0;
    for (const cat of OUTFLOW_CATEGORIES) {
      for (const sub of monthData.categories[cat] || []) plannedOutflow += Number(sub.planned) || 0;
    }
    let spent = 0;
    let actualIncome = 0;
    for (const tx of monthData.transactions) {
      if (tx.category === "Income") actualIncome += Number(tx.amount) || 0;
      else spent += Number(tx.amount) || 0;
    }
    const leftToBudget = plannedIncome - plannedOutflow;
    const leftToSpend = plannedOutflow - spent;
    const projectedBalance = plannedIncome - spent;
    return { plannedIncome, plannedOutflow, leftToBudget, spent, leftToSpend, projectedBalance, actualIncome };
  }, [monthData]);

  const currency = data.currency;

  return (
    <React.Fragment>
      <header className="top">
        <h1>💶 Budget Planner</h1>
        <div className="month-switcher">
          <button className="nav" onClick={() => setCurrentMonth(shiftMonth(monthKeyCurrent, -1))}>‹</button>
          <div className="month-label">{monthLabel(monthKeyCurrent)}</div>
          <button className="nav" onClick={() => setCurrentMonth(shiftMonth(monthKeyCurrent, 1))}>›</button>
        </div>
        <select value={currency} onChange={(e) => setCurrency(e.target.value)}>
          {CURRENCIES.map((c) => (
            <option key={c.code} value={c.code}>{c.code} ({c.symbol})</option>
          ))}
        </select>
      </header>

      {!isStandalone && showInstallBanner && (
        <div className="install-banner">
          {isIOS ? (
            <span>Install on your iPhone/iPad: tap Share → "Add to Home Screen".</span>
          ) : installEvent ? (
            <span>Install this app for quick access from your dock or home screen.</span>
          ) : (
            <span>Tip: use your browser's "Install app" / "Add to Dock" option for offline access.</span>
          )}
          <div style={{ display: "flex", gap: 8 }}>
            {installEvent && (
              <button
                onClick={async () => {
                  installEvent.prompt();
                  await installEvent.userChoice;
                  setInstallEvent(null);
                }}
              >
                Install
              </button>
            )}
            <button onClick={() => setShowInstallBanner(false)} style={{ background: "transparent", color: "var(--text-dim)", border: "1px solid var(--border)" }}>
              Dismiss
            </button>
          </div>
        </div>
      )}

      <SummaryBar totals={totals} currency={currency} />

      <CategoriesBlock
        categories={monthData.categories}
        spentBySubcat={spentBySubcat}
        currency={currency}
        onAddSub={addSubcategory}
        onUpdateSub={updateSubcategory}
        onRemoveSub={removeSubcategory}
      />

      <TransactionsBlock
        categories={monthData.categories}
        transactions={monthData.transactions}
        currency={currency}
        onAdd={addTransaction}
        onRemove={removeTransaction}
      />

      <SinkingFundsBlock funds={data.sinkingFunds} currency={currency} onAdd={addFund} onUpdate={updateFund} onRemove={removeFund} />

      <footer className="app-footer">All data is stored locally on this device. No account, no servers.</footer>
    </React.Fragment>
  );
}

function SummaryBar({ totals, currency }) {
  const cards = [
    { label: "Planned Income", value: totals.plannedIncome, cls: "" },
    { label: "Planned Outflow", value: totals.plannedOutflow, cls: "" },
    { label: "Left to Budget", value: totals.leftToBudget, cls: totals.leftToBudget < 0 ? "neg" : "pos" },
    { label: "Spent", value: totals.spent, cls: "" },
    { label: "Left to Spend", value: totals.leftToSpend, cls: totals.leftToSpend < 0 ? "neg" : "pos" },
    { label: "Projected Balance", value: totals.projectedBalance, cls: totals.projectedBalance < 0 ? "neg" : "pos" },
  ];
  return (
    <div className="summary-grid">
      {cards.map((c) => (
        <div className="summary-card" key={c.label}>
          <div className="label">{c.label}</div>
          <div className={`value ${c.cls}`}>{formatMoney(c.value, currency)}</div>
        </div>
      ))}
    </div>
  );
}

function CategoriesBlock({ categories, spentBySubcat, currency, onAddSub, onUpdateSub, onRemoveSub }) {
  return (
    <section className="block">
      <h2>Envelopes</h2>
      <div className="categories-grid">
        {FIXED_CATEGORIES.map((cat) => {
          const subs = categories[cat] || [];
          const plannedTotal = subs.reduce((s, x) => s + (Number(x.planned) || 0), 0);
          const spentTotal = subs.reduce((s, x) => s + (spentBySubcat[`${cat}::${x.name}`] || 0), 0);
          return (
            <div className="category-card" key={cat}>
              <h3>{cat}</h3>
              <div className="cat-totals">
                Planned {formatMoney(plannedTotal, currency)} · {cat === "Income" ? "Received" : "Spent"} {formatMoney(spentTotal, currency)}
              </div>
              {subs.map((sub) => {
                const spent = spentBySubcat[`${cat}::${sub.name}`] || 0;
                return (
                  <div className="subcat-row" key={sub.id}>
                    <input
                      className="name"
                      value={sub.name}
                      onChange={(e) => onUpdateSub(cat, sub.id, { name: e.target.value })}
                    />
                    <input
                      className="planned"
                      type="number"
                      step="0.01"
                      value={sub.planned}
                      onChange={(e) => onUpdateSub(cat, sub.id, { planned: e.target.value === "" ? "" : Number(e.target.value) })}
                    />
                    <span className="spent-tag">{formatMoney(spent, currency)}</span>
                    <button className="icon-btn" onClick={() => onRemoveSub(cat, sub.id)} title="Remove">✕</button>
                  </div>
                );
              })}
              <button className="add-link" onClick={() => onAddSub(cat)}>+ Add sub-category</button>
            </div>
          );
        })}
      </div>
    </section>
  );
}

function flattenSubcats(categories, cat) {
  return (categories[cat] || []).map((s) => s.name);
}

function TransactionsBlock({ categories, transactions, currency, onAdd, onRemove }) {
  const todayStr = new Date().toISOString().slice(0, 10);
  const [date, setDate] = useState(todayStr);
  const [category, setCategory] = useState(FIXED_CATEGORIES[0]);
  const [subCategory, setSubCategory] = useState("");
  const [amount, setAmount] = useState("");
  const [description, setDescription] = useState("");

  const subOptions = flattenSubcats(categories, category);

  useEffect(() => {
    if (!subOptions.includes(subCategory)) {
      setSubCategory(subOptions[0] || "");
    }
  }, [category, categories]);

  function submit(e) {
    e.preventDefault();
    if (!subCategory || !amount) return;
    onAdd({ date, category, subCategory, amount: Number(amount), description });
    setAmount("");
    setDescription("");
  }

  const sorted = [...transactions].sort((a, b) => (a.date < b.date ? 1 : -1));

  return (
    <section className="block">
      <h2>Transactions</h2>
      <form className="tx-form" onSubmit={submit}>
        <input type="date" value={date} onChange={(e) => setDate(e.target.value)} required />
        <select value={category} onChange={(e) => setCategory(e.target.value)}>
          {FIXED_CATEGORIES.map((c) => (
            <option key={c} value={c}>{c}</option>
          ))}
        </select>
        <select value={subCategory} onChange={(e) => setSubCategory(e.target.value)}>
          {subOptions.length === 0 && <option value="">(no sub-categories)</option>}
          {subOptions.map((s) => (
            <option key={s} value={s}>{s}</option>
          ))}
        </select>
        <input
          type="number"
          step="0.01"
          placeholder="Amount"
          value={amount}
          onChange={(e) => setAmount(e.target.value)}
          required
        />
        <input
          type="text"
          placeholder="Description"
          value={description}
          onChange={(e) => setDescription(e.target.value)}
        />
        <button className="btn-primary" type="submit">Add</button>
      </form>

      <div className="table-wrap">
        {sorted.length === 0 ? (
          <div className="empty-note">No transactions this month yet.</div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Sub-category</th>
                <th>Description</th>
                <th style={{ textAlign: "right" }}>Amount</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {sorted.map((tx) => (
                <tr key={tx.id}>
                  <td>{tx.date}</td>
                  <td>{tx.category}</td>
                  <td>{tx.subCategory}</td>
                  <td>{tx.description}</td>
                  <td className="tx-amount">{formatMoney(tx.amount, currency)}</td>
                  <td>
                    <button className="icon-btn" onClick={() => onRemove(tx.id)} title="Delete">✕</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </section>
  );
}

function addMonths(date, months) {
  const d = new Date(date);
  d.setMonth(d.getMonth() + months);
  return d;
}

function SinkingFundsBlock({ funds, currency, onAdd, onUpdate, onRemove }) {
  const [name, setName] = useState("");
  const [target, setTarget] = useState("");
  const [contribution, setContribution] = useState("");

  function submit(e) {
    e.preventDefault();
    if (!name || !target) return;
    onAdd({ name, target: Number(target), monthlyContribution: Number(contribution) || 0, saved: 0 });
    setName("");
    setTarget("");
    setContribution("");
  }

  return (
    <section className="block">
      <h2>Sinking Funds</h2>
      <form className="fund-form" onSubmit={submit}>
        <input type="text" placeholder="Goal name" value={name} onChange={(e) => setName(e.target.value)} required />
        <input type="number" step="0.01" placeholder="Target" value={target} onChange={(e) => setTarget(e.target.value)} required />
        <input type="number" step="0.01" placeholder="Monthly €" value={contribution} onChange={(e) => setContribution(e.target.value)} />
        <button className="btn-primary" type="submit">Add Goal</button>
      </form>

      {funds.length === 0 ? (
        <div className="empty-note">No sinking funds yet. Add a savings goal above.</div>
      ) : (
        <div className="funds-grid">
          {funds.map((f) => {
            const pct = f.target > 0 ? Math.min(100, (f.saved / f.target) * 100) : 0;
            const remaining = Math.max(0, f.target - f.saved);
            const monthsLeft = f.monthlyContribution > 0 ? Math.ceil(remaining / f.monthlyContribution) : null;
            const completion =
              monthsLeft !== null
                ? addMonths(new Date(), monthsLeft).toLocaleDateString(undefined, { month: "short", year: "numeric" })
                : "—";
            return (
              <div className="fund-card" key={f.id}>
                <h3>
                  <input
                    value={f.name}
                    onChange={(e) => onUpdate(f.id, { name: e.target.value })}
                    style={{ background: "transparent", border: "none", color: "inherit", fontSize: 15, fontWeight: 600, padding: 0 }}
                  />
                  <button className="icon-btn" onClick={() => onRemove(f.id)} title="Delete">✕</button>
                </h3>
                <div className="fund-meta">
                  <span>Target: {formatMoney(f.target, currency)}</span>
                  <span>Saved: {formatMoney(f.saved, currency)}</span>
                </div>
                <div className="progress-track">
                  <div className="progress-fill" style={{ width: `${pct}%` }} />
                </div>
                <div className="fund-meta">
                  <span>{pct.toFixed(0)}% funded</span>
                  <span>{monthsLeft !== null ? `${monthsLeft} months left` : "Set a monthly contribution"}</span>
                  <span>Est. completion: {completion}</span>
                </div>
                <div style={{ display: "flex", gap: 8, marginTop: 8, alignItems: "center" }}>
                  <label style={{ fontSize: 12, color: "var(--text-dim)" }}>Monthly</label>
                  <input
                    type="number"
                    step="0.01"
                    value={f.monthlyContribution}
                    onChange={(e) => onUpdate(f.id, { monthlyContribution: Number(e.target.value) || 0 })}
                    style={{ width: 80 }}
                  />
                  <label style={{ fontSize: 12, color: "var(--text-dim)" }}>Saved</label>
                  <input
                    type="number"
                    step="0.01"
                    value={f.saved}
                    onChange={(e) => onUpdate(f.id, { saved: Number(e.target.value) || 0 })}
                    style={{ width: 90 }}
                  />
                </div>
                <div className="fund-actions">
                  <button onClick={() => onUpdate(f.id, { saved: f.saved + (Number(f.monthlyContribution) || 0) })}>
                    + Log monthly contribution
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </section>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
